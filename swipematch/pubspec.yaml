name: swipematch
description: Tinder for jobs with AI matching.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.0

  # Navigation
  go_router: ^14.6.0

  # Swipe cards
  flutter_card_swiper: ^7.0.0

  # Animations
  rive: ^0.13.18
  lottie: ^3.3.1
  flutter_animate: ^4.5.2

  # Storage
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4

  # Network
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.3

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.4

  # Charts
  fl_chart: ^0.69.0

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # Video pitch
  camera: ^0.11.0+2
  video_player: ^2.9.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
